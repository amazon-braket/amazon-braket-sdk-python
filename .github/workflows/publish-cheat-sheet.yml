name: Publish Cheat Sheet

on:
  push:
    branches:
      - main
    paths:
      - "doc/cheat_sheet/**"
      - "doc/genai_cheat_sheet.md"
      - ".github/workflows/publish-cheat-sheet.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./doc/cheat_sheet
          destination: ./_site
      - name: Generate Markdown companion
        run: python3 doc/cheat_sheet/_scripts/generate_markdown.py --output _site/genai_cheat_sheet.md
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
